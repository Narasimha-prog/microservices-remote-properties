#eureka
eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka/

  instance:
    prefer-ip-address: true


server:
  port: 7777

swagger:
  services:
    - name: AUTHENTICATION-SERVICE
      url: http://AUTHENTICATION-SERVICE/v3/api-docs
    - name: USER-SERVICE
      url: http://USER-SERVICE/v3/api-docs
    - name: ORDER-SERVICE
      url: http://ORDER-SERVICE/v3/api-docs
    - name: PRODUCT-SERVICE
      url: http://PRODUCT-SERVICE/v3/api-docs
    - name: PAYMENT-SERVICE
      url: http://PAYMENT-SERVICE/v3/api-docs
    - name: INVENTORY-SERVICE
      url: http://INVENTORY-SERVICE/v3/api-docs
    - name: CART-SERVICE
      url: http://CART-SERVICE/v3/api-docs

springdoc:
  swagger-ui:
    urls[0].name: Authentication
    urls[0].url: /v3/api-docs/authentication
    urls[1].name: User
    urls[1].url: /v3/api-docs/user
    urls[2].name: Order
    urls[2].url: /v3/api-docs/order
    urls[3].name: Product
    urls[3].url: /v3/api-docs/product
    urls[4].name: Payment
    urls[4].url: /v3/api-docs/payment
    urls[5].name: Inventory
    urls[5].url: /v3/api-docs/inventory
    urls[6].name: Cart
    urls[6].url: /v3/api-docs/cart

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always

#cors properties

application:
  cors:
    allowed-origins:
      - "*"
    allowed-methods:
      - GET
      - POST
    allowed-headers:
      - Authorization
      - Content-Type
    allow-credentials: false