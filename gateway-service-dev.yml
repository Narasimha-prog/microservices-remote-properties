
server:
  port: 8080

spring:
  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
      routes:

        # 🔓 AUTH SERVICE (Public Endpoints)
        - id: authentication-service
          uri: lb://authentication-service
          predicates:
            - Path=/auth/api/v1/auth/**,/auth/v3/api-docs/**,/auth/swagger-ui/**,/auth/swagger-ui.html
          filters:
            - RemoveRequestHeader=Cookie
            - RewritePath=/auth/(?<segment>.*), /${segment}

        # 🔓 USER REGISTER (Public)
        - id: user-service-register
          uri: lb://user-service
          predicates:
            - Path=/api/v1/users/register
          filters:
            - RemoveRequestHeader=Cookie

        # 🔐 USER SERVICE (Protected)
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/v1/users/**
          filters:
            - JwtValidation

        # 🔐 ORDER SERVICE
        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/api/v1/orders/**
          filters:
            - JwtValidation

        # 🔐 PRODUCT SERVICE
        - id: product-service
          uri: lb://product-service
          predicates:
            - Path=/api/v1/products/**
          filters:
            - JwtValidation

        # 🔐 INVENTORY SERVICE
        - id: inventory-service
          uri: lb://inventory-service
          predicates:
            - Path=/api/v1/inventory/**
          filters:
            - JwtValidation

        # 🔐 PAYMENT SERVICE
        - id: payment-service
          uri: lb://payment-service
          predicates:
            - Path=/api/v1/payments/**
          filters:
            - JwtValidation
#eureka
eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka/

  instance:
    prefer-ip-address: true


#jwt token
jwt:
  secret: YXNkZmFzZGZhc2RmYXNkZmFzZGZhc2RmYXNkZmFzZGZhc2Rm  # base64 string (min 256 bits)
  access:
    expiration: 900000       # 15 minutes
  refresh:
    expiration: 604800000    # 7 days



