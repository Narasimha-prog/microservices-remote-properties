spring:
#data source
 datasource:
   url: jdbc:postgresql://localhost:5430/ecommerce_db
   username: admin
   password: admin
   driver-class-name: org.postgresql.Driver

# data jpa

 jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
         # The number of statements to group together (recommended: 10-50)
        jdbc:
          batch_size: 25
        default_batch_fetch_size: 50 
        # Groups multiple 'insert' or 'update' statements for the same table
        # to ensure they are sent in a single batch
        order_inserts: true
        order_updates: true
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

#liquibase
 liquibase:
    enabled: false
    change-log: classpath:db/changelog/db.changelog-master.yaml
#kafka

 kafka:
    bootstrap-servers: localhost:9092

    consumer:
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer

      properties:
        spring.json.trusted.packages: "*"      # allow any class
        spring.json.use.type.headers: false    # ignore type headers
        spring.json.value.default.type: com.eswar.paymentservice.kafka.events.OrderCreatedEvent  

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

      properties:
        spring.json.add.type.headers: false 

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

  instance:
    prefer-ip-address: true




server:
  port: 8086

#actuators
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
      
razorpay:
  key: ${RAZORPAY_KEY}
  secret: ${RAZORPAY_VALUE}
  currency: INR



