spring:

 kafka:
    bootstrap-servers: localhost:9092
    
    listener:
      # This is the "Receipt Book" fix. 
      # It allows you to use 'Acknowledgment ack' in your method parameters.
      ack-mode: manual_immediate
    consumer:
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer

      properties:
        spring.json.use.type.headers: false  
        spring.json.trusted.packages: "*"      # allow any class
        spring.json.value.default.type: com.sitamahalakshmi.notification_service.kafka.events.OrderCreatedEvent
 mail:
    host: smtp.gmail.com
    port: 587
    username: lnreddyreddy405@gmail.com
    password: ${app-password} # Not your login password, but a generated App Password
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true      # ignore type headers
            required: true



 eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

  instance:
    prefer-ip-address: true


server:
  port: 8088

#actuators
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always

grpc:
  client:
    user-service: # This must match the name inside @GrpcClient("product-service")
      address: 'discovery:///user-service'
      negotiation-type: plaintext