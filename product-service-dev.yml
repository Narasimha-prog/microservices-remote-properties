spring:
#data source
 datasource:
   url: ${DB_URL}
   username: ${DB_USER_NAME}
   password: ${DB_PASSWORD}
   driver-class-name: org.postgresql.Driver

# data jpa

 jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
         # The number of statements to group together (recommended: 10-50)
        jdbc:
          batch_size: 25
        default_batch_fetch_size: 50 
        # Groups multiple 'insert' or 'update' statements for the same table
        # to ensure they are sent in a single batch
        order_inserts: true
        order_updates: true
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect


#liquibase
 liquibase:
    enabled: false
    change-log: classpath:db/changelog/db.changelog-master.yaml


  
 servlet:
    multipart:
      enabled: true
      max-file-size: 10MB      # Individual file limit (e.g., one image)
      max-request-size: 50MB   # Total request limit (e.g., all images combined)

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

  instance:
    prefer-ip-address: true




server:
  port: 8083

#actuators
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always


#cors properties

application:
  cors:
    allowed-origins:
      - "http://localhost:7777"
      - "http://10.144.131.219:7777"
    allowed-methods:
      - GET
      - POST
      - PUT
      - OPTIONS
    allowed-headers:
      - Authorization
      - Content-Type
    allow-credentials: true



aws:
  region: us-east-1
  access-key: YOUR_ACCESS_KEY
  secret-key: YOUR_SECRET_KEY
  bucket-name: your-product-images-bucket