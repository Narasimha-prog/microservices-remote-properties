spring:
#data source
 datasource:
   url: jdbc:postgresql://localhost:5430/ecommerce_db
   username: admin
   password: admin
   driver-class-name: org.postgresql.Driver

# data jpa

 jpa:
   hibernate:
    ddl-auto: update
   show-sql: true
   properties:
    hibernate:
       format_sql: true
       dialect: org.hibernate.dialect.PostgreSQLDialect


#liquibase
 liquibase:
    enabled: false
    change-log: classpath:db/changelog/db.changelog-master.yaml

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

  instance:
    prefer-ip-address: true




server:
  port: 8083

#actuators
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always


#cors properties

application:
  cors:
    allowed-origins:
      - "http://localhost:7777"
      - "http://10.144.131.219:7777"
    allowed-methods:
      - GET
      - POST
      - PUT
      - OPTIONS
    allowed-headers:
      - Authorization
      - Content-Type
    allow-credentials: true